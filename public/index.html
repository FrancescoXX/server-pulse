<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse — web server score</title>
<style>
  :root {
    --page: #0a0a0a;
    --surface: #111111;
    --surface-2: #161616;
    --border: rgba(255, 255, 255, 0.09);
    --ink-1: #f5f5f5;
    --ink-2: #a1a1a1;
    --ink-3: #6e6e6e;
    --good: #0ca30c;
    --warn: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
    --accent: #3987e5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: 22px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 72px;
  }
  .logo {
    width: 22px; height: 22px; border-radius: 50%;
    background: conic-gradient(from 180deg, #3987e5, #9085e9, #3987e5);
  }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .brand span { color: var(--ink-3); font-weight: 400; }

  h1 {
    font-size: clamp(34px, 6vw, 52px);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.05;
    text-align: center;
    background: linear-gradient(180deg, #ffffff 30%, #8a8a8a);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { text-align: center; color: var(--ink-2); margin: 16px 0 40px; font-size: 16px; }

  form {
    display: flex; gap: 10px; max-width: 560px; margin: 0 auto;
  }
  input[type="url"], input[type="text"] {
    flex: 1; min-width: 0;
    background: var(--surface); color: var(--ink-1);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 15px; font-family: inherit;
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: rgba(255, 255, 255, 0.28); }
  input::placeholder { color: var(--ink-3); }
  button {
    background: #ededed; color: #0a0a0a;
    border: 0; border-radius: 8px; padding: 12px 22px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  button:hover { background: #ffffff; }
  button:disabled { background: #3a3a3a; color: #8a8a8a; cursor: default; }

  .error {
    max-width: 560px; margin: 20px auto 0;
    border: 1px solid rgba(208, 59, 59, 0.45); border-radius: 8px;
    background: rgba(208, 59, 59, 0.08);
    padding: 12px 14px; font-size: 14px; color: var(--ink-1);
    display: none;
  }

  #result { display: none; margin-top: 64px; }

  .scorecard {
    display: flex; align-items: center; gap: 36px; flex-wrap: wrap;
    justify-content: center;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 36px;
  }
  .ring { position: relative; width: 168px; height: 168px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .track { stroke-opacity: 0.16; }
  .ring .fill {
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s cubic-bezier(.2,.7,.3,1), stroke .3s;
  }
  .ring .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-num { font-size: 52px; font-weight: 650; letter-spacing: -0.02em; line-height: 1; }
  .score-cap { font-size: 12px; color: var(--ink-3); margin-top: 5px; }

  .verdict { flex: 1; min-width: 230px; }
  .grade-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .grade {
    font-size: 15px; font-weight: 700;
    padding: 3px 12px; border-radius: 999px;
    border: 1px solid currentColor;
  }
  .grade-label { font-size: 15px; font-weight: 600; }
  .target { font-size: 14px; color: var(--ink-2); word-break: break-all; line-height: 1.6; }
  .target b { color: var(--ink-1); font-weight: 500; }
  .meta { font-size: 13px; color: var(--ink-3); margin-top: 10px; }

  .tiles {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-top: 12px;
  }
  .tile {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 16px 18px;
  }
  .tile .label { font-size: 13px; color: var(--ink-2); }
  .tile .value { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin-top: 6px; }
  .tile .value small { font-size: 14px; font-weight: 400; color: var(--ink-3); margin-left: 2px; }

  .cat {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 22px 24px; margin-top: 12px;
  }
  .cat-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .cat-head h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .cat-head .pts { font-size: 13px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .meter { height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 16px; position: relative; }
  .meter .m-track { position: absolute; inset: 0; opacity: 0.16; }
  .meter .m-fill { position: absolute; inset: 0 auto 0 0; border-radius: 3px; transition: width .8s cubic-bezier(.2,.7,.3,1); }

  .check {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 0; border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .check:first-of-type { border-top: 0; }
  .icon {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #0a0a0a;
    transform: translateY(3px);
  }
  .check .name { color: var(--ink-1); }
  .check .val {
    margin-left: auto; color: var(--ink-2); text-align: right;
    font-variant-numeric: tabular-nums; word-break: break-word;
  }
  .check .hint { flex-basis: 100%; padding-left: 28px; font-size: 13px; color: var(--ink-3); margin-top: -4px; }
  .check-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; width: 100%; }

  footer { margin-top: 56px; text-align: center; font-size: 13px; color: var(--ink-3); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(10,10,10,0.25); border-top-color: #0a0a0a;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: -2px; margin-right: 8px;
  }
  @media (max-width: 560px) {
    form { flex-direction: column; }
    .scorecard { padding: 26px; gap: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"></div>
    <div class="brand">pulse <span>/ server score</span></div>
  </header>

  <h1>How healthy is<br>your web server?</h1>
  <p class="sub">Paste a URL. Get a score for speed, security and best practices.</p>

  <form id="form">
    <input id="url" type="text" placeholder="example.com" autocomplete="off" spellcheck="false" autofocus>
    <button id="go" type="submit">Analyze</button>
  </form>
  <div class="error" id="error"></div>

  <section id="result" aria-live="polite">
    <div class="scorecard">
      <div class="ring">
        <svg width="168" height="168" viewBox="0 0 168 168">
          <circle class="track" cx="84" cy="84" r="74" fill="none" stroke-width="10"></circle>
          <circle class="fill" cx="84" cy="84" r="74" fill="none" stroke-width="10"></circle>
        </svg>
        <div class="center">
          <div class="score-num" id="score">0</div>
          <div class="score-cap">out of 100</div>
        </div>
      </div>
      <div class="verdict">
        <div class="grade-row">
          <span class="grade" id="grade">–</span>
          <span class="grade-label" id="gradeLabel"></span>
        </div>
        <div class="target" id="target"></div>
        <div class="meta" id="meta"></div>
      </div>
    </div>

    <div class="tiles" id="tiles"></div>
    <div id="cats"></div>
  </section>

  <footer>Scores are heuristic — measured from this server's location in a single pass.</footer>
</div>

<script>
(() => {
  const STATUS = {
    good:     { color: 'var(--good)',     icon: '✓', word: 'ok' },
    warn:     { color: 'var(--warn)',     icon: '!', word: 'could improve' },
    bad:      { color: 'var(--critical)', icon: '✕', word: 'failing' },
  };
  const gradeWords = {
    'A+': 'Excellent', 'A': 'Excellent', 'B': 'Good',
    'C': 'Needs work', 'D': 'Poor', 'F': 'Failing',
  };
  const scoreColor = (s) =>
    s >= 90 ? 'var(--good)' : s >= 65 ? 'var(--warn)' : s >= 40 ? 'var(--serious)' : 'var(--critical)';

  const $ = (id) => document.getElementById(id);
  const form = $('form'), input = $('url'), btn = $('go');
  const R = 74, CIRC = 2 * Math.PI * R;
  const fill = document.querySelector('.ring .fill');
  const track = document.querySelector('.ring .track');
  fill.style.strokeDasharray = CIRC;
  fill.style.strokeDashoffset = CIRC;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const value = input.value.trim();
    if (!value) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyzing';
    $('error').style.display = 'none';

    try {
      const res = await fetch('/api/analyze?url=' + encodeURIComponent(value));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'analysis failed');
      render(data);
    } catch (err) {
      $('result').style.display = 'none';
      const box = $('error');
      box.textContent = err.message;
      box.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze';
    }
  });

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function render(d) {
    $('result').style.display = 'block';

    const color = scoreColor(d.score);
    fill.style.stroke = color;
    track.style.stroke = color;
    fill.style.strokeDashoffset = CIRC;
    requestAnimationFrame(() =>
      requestAnimationFrame(() => {
        fill.style.strokeDashoffset = CIRC * (1 - d.score / 100);
      })
    );

    // count-up
    const el = $('score');
    const t0 = performance.now();
    (function tick(now) {
      const k = Math.min(1, (now - t0) / 900);
      el.textContent = Math.round(d.score * (1 - Math.pow(1 - k, 3)));
      if (k < 1) requestAnimationFrame(tick);
    })(t0);

    const g = $('grade');
    g.textContent = d.grade;
    g.style.color = color;
    $('gradeLabel').textContent = gradeWords[d.grade] || '';

    const redirected = d.finalUrl !== d.requestedUrl;
    $('target').innerHTML =
      '<b>' + esc(d.finalUrl) + '</b>' +
      (redirected ? '<br>redirected from ' + esc(d.requestedUrl) : '');
    $('meta').textContent = [
      d.ip && 'IP ' + d.ip,
      'HTTP ' + d.httpStatus,
      d.issuer && 'cert by ' + d.issuer,
    ].filter(Boolean).join('  ·  ');

    const tileDefs = [
      ['Time to first byte', d.timings.ttfb],
      ['Full response', d.timings.total],
      ['TLS handshake', d.timings.tls],
      ['DNS lookup', d.timings.dns],
    ];
    $('tiles').innerHTML = tileDefs.map(([label, v]) =>
      '<div class="tile"><div class="label">' + esc(label) + '</div>' +
      '<div class="value">' + (v == null ? '–' : esc(v) + '<small>ms</small>') + '</div></div>'
    ).join('');

    $('cats').innerHTML = d.categories.map((c) => {
      const pct = c.max ? (c.points / c.max) * 100 : 0;
      const mColor = pct >= 85 ? 'var(--good)' : pct >= 55 ? 'var(--warn)' : pct >= 30 ? 'var(--serious)' : 'var(--critical)';
      const rows = d.checks.filter((x) => x.category === c.id).map((x) => {
        const s = STATUS[x.status] || STATUS.warn;
        return '<div class="check"><div class="check-row">' +
          '<span class="icon" style="background:' + s.color + '" title="' + s.word + '">' + s.icon + '</span>' +
          '<span class="name">' + esc(x.label) + '</span>' +
          '<span class="val">' + esc(x.value) + '</span>' +
          (x.hint ? '<div class="hint">' + esc(x.hint) + '</div>' : '') +
          '</div></div>';
      }).join('');
      return '<div class="cat">' +
        '<div class="cat-head"><h2>' + esc(c.label) + '</h2>' +
        '<span class="pts">' + c.points + ' / ' + c.max + '</span></div>' +
        '<div class="meter">' +
          '<div class="m-track" style="background:' + mColor + '"></div>' +
          '<div class="m-fill" style="background:' + mColor + ';width:' + pct + '%"></div>' +
        '</div>' + rows + '</div>';
    }).join('');
  }
})();
</script>
</body>
</html>
