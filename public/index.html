<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse — web server score</title>
<style>
  :root {
    --page: #0a0a0a;
    --surface: #111111;
    --surface-2: #161616;
    --border: rgba(255, 255, 255, 0.09);
    --ink-1: #f5f5f5;
    --ink-2: #a1a1a1;
    --ink-3: #6e6e6e;
    --good: #0ca30c;
    --warn: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
    --accent: #3987e5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: 22px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 72px;
  }
  .logo {
    width: 22px; height: 22px; border-radius: 50%;
    background: conic-gradient(from 180deg, #3987e5, #9085e9, #3987e5);
  }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .brand span { color: var(--ink-3); font-weight: 400; }
  .gh {
    margin-left: auto; display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink-2); text-decoration: none; font-size: 13px;
    border: 1px solid var(--border); border-radius: 999px; padding: 6px 13px;
    transition: color .15s, border-color .15s;
  }
  .gh:hover { color: var(--ink-1); border-color: rgba(255, 255, 255, 0.28); }
  .gh svg { fill: currentColor; flex-shrink: 0; }
  .gh .stars {
    display: none; align-items: center; gap: 4px;
    padding-left: 8px; border-left: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .gh .stars.on { display: inline-flex; }

  h1 {
    font-size: clamp(34px, 6vw, 52px);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.05;
    text-align: center;
    background: linear-gradient(180deg, #ffffff 30%, #8a8a8a);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { text-align: center; color: var(--ink-2); margin: 16px 0 40px; font-size: 16px; }

  form {
    display: flex; gap: 10px; max-width: 560px; margin: 0 auto;
  }
  input[type="url"], input[type="text"] {
    flex: 1; min-width: 0;
    background: var(--surface); color: var(--ink-1);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 15px; font-family: inherit;
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: rgba(255, 255, 255, 0.28); }
  input::placeholder { color: var(--ink-3); }
  button {
    background: #ededed; color: #0a0a0a;
    border: 0; border-radius: 8px; padding: 12px 22px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  button:hover { background: #ffffff; }
  button:disabled { background: #3a3a3a; color: #8a8a8a; cursor: default; }

  .error {
    max-width: 560px; margin: 20px auto 0;
    border: 1px solid rgba(208, 59, 59, 0.45); border-radius: 8px;
    background: rgba(208, 59, 59, 0.08);
    padding: 12px 14px; font-size: 14px; color: var(--ink-1);
    display: none;
  }

  #result { display: none; margin-top: 64px; }

  .scorecard {
    display: flex; align-items: center; gap: 36px; flex-wrap: wrap;
    justify-content: center;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 36px;
  }
  .ring { position: relative; width: 168px; height: 168px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .track { stroke-opacity: 0.16; }
  .ring .fill {
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s cubic-bezier(.2,.7,.3,1), stroke .3s;
  }
  .ring .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-num { font-size: 52px; font-weight: 650; letter-spacing: -0.02em; line-height: 1; }
  .score-cap { font-size: 12px; color: var(--ink-3); margin-top: 5px; }

  .verdict { flex: 1; min-width: 230px; }
  .grade-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .grade {
    font-size: 15px; font-weight: 700;
    padding: 3px 12px; border-radius: 999px;
    border: 1px solid currentColor;
  }
  .grade-label { font-size: 15px; font-weight: 600; }
  .target { font-size: 14px; color: var(--ink-2); word-break: break-all; line-height: 1.6; }
  .target b { color: var(--ink-1); font-weight: 500; }
  .meta { font-size: 13px; color: var(--ink-3); margin-top: 10px; }

  .tiles {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-top: 12px;
  }
  .tile {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 16px 18px;
  }
  .tile .label { font-size: 13px; color: var(--ink-2); }
  .tile .value { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin-top: 6px; }
  .tile .value small { font-size: 14px; font-weight: 400; color: var(--ink-3); margin-left: 2px; }

  .cat {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); padding: 22px 24px; margin-top: 12px;
  }
  .cat-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .cat-head h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .cat-head .pts { font-size: 13px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .meter { height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 16px; position: relative; }
  .meter .m-track { position: absolute; inset: 0; opacity: 0.16; }
  .meter .m-fill { position: absolute; inset: 0 auto 0 0; border-radius: 3px; transition: width .8s cubic-bezier(.2,.7,.3,1); }

  .check {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 0; border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .check:first-of-type { border-top: 0; }
  .icon {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #0a0a0a;
    transform: translateY(3px);
  }
  .check .name { color: var(--ink-1); }
  .check .val {
    margin-left: auto; color: var(--ink-2); text-align: right;
    font-variant-numeric: tabular-nums; word-break: break-word;
  }
  .check .hint { flex-basis: 100%; padding-left: 28px; font-size: 13px; color: var(--ink-3); margin-top: -4px; }
  .check-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; width: 100%; }

  /* request phase breakdown */
  .phasebar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; margin: 4px 0 16px; }
  .phasebar .seg { min-width: 3px; }
  .phasebar .seg + .seg { margin-left: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 20px; }
  .legend .li { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-2); }
  .legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend b { color: var(--ink-1); font-weight: 500; font-variant-numeric: tabular-nums; }

  /* TTFB stability columns */
  .bench {
    display: flex; align-items: flex-end; gap: 12px;
    height: 120px; position: relative; margin-top: 10px;
    border-bottom: 1px solid #2c2c2a; padding: 0 4px;
  }
  .bench .bcol { flex: 0 0 24px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
  .bench .bfill { background: #3987e5; border-radius: 4px 4px 0 0; transition: height .6s cubic-bezier(.2,.7,.3,1); }
  .bench .median {
    position: absolute; left: 0; right: 0; height: 0;
    border-top: 1px solid #898781; pointer-events: none;
  }
  .bench .median span {
    position: absolute; right: 0; bottom: 3px;
    font-size: 11px; color: var(--ink-3); background: var(--surface); padding-left: 6px;
  }
  .bruns { display: flex; gap: 12px; padding: 6px 4px 0; }
  .bruns span { flex: 0 0 24px; text-align: center; font-size: 11px; color: var(--ink-3); }

  /* detected stack chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface-2); padding: 6px 13px; font-size: 13px;
  }
  .chip .cat-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); }
  .nodetect { font-size: 14px; color: var(--ink-2); }

  footer { margin-top: 56px; text-align: center; font-size: 13px; color: var(--ink-3); }
  footer .credits { margin-top: 10px; color: var(--ink-2); }
  footer a { color: var(--ink-1); text-decoration: none; border-bottom: 1px solid var(--ink-3); transition: border-color .15s; }
  footer a:hover { border-color: var(--ink-1); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(10,10,10,0.25); border-top-color: #0a0a0a;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: -2px; margin-right: 8px;
  }
  @media (max-width: 560px) {
    form { flex-direction: column; }
    .scorecard { padding: 26px; gap: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"></div>
    <div class="brand">pulse <span>/ server score</span></div>
    <a class="gh" href="https://github.com/FrancescoXX/server-pulse" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      <span>GitHub</span>
      <span class="stars" id="stars">★ <span id="starCount"></span></span>
    </a>
  </header>

  <h1>How healthy is<br>your web server?</h1>
  <p class="sub">Paste a URL. Get a score for speed, security and best practices.</p>

  <form id="form">
    <input id="url" type="text" placeholder="example.com" autocomplete="off" spellcheck="false" autofocus>
    <button id="go" type="submit">Analyze</button>
  </form>
  <div class="error" id="error"></div>

  <section id="result" aria-live="polite">
    <div class="scorecard">
      <div class="ring">
        <svg width="168" height="168" viewBox="0 0 168 168">
          <circle class="track" cx="84" cy="84" r="74" fill="none" stroke-width="10"></circle>
          <circle class="fill" cx="84" cy="84" r="74" fill="none" stroke-width="10"></circle>
        </svg>
        <div class="center">
          <div class="score-num" id="score">0</div>
          <div class="score-cap">out of 100</div>
        </div>
      </div>
      <div class="verdict">
        <div class="grade-row">
          <span class="grade" id="grade">–</span>
          <span class="grade-label" id="gradeLabel"></span>
        </div>
        <div class="target" id="target"></div>
        <div class="meta" id="meta"></div>
      </div>
    </div>

    <div class="tiles" id="tiles"></div>
    <div id="extras"></div>
    <div id="cats"></div>
  </section>

  <footer>
    <div>Scores are heuristic — measured from this server's location in a single pass.</div>
    <div class="credits">
      Done with <a href="https://zerops.io" target="_blank" rel="noopener">Zerops</a>
      &nbsp;·&nbsp;
      Made by <a href="https://francescociulla.com" target="_blank" rel="noopener">Francesco</a>
    </div>
  </footer>
</div>

<script>
(() => {
  const STATUS = {
    good:     { color: 'var(--good)',     icon: '✓', word: 'ok' },
    warn:     { color: 'var(--warn)',     icon: '!', word: 'could improve' },
    bad:      { color: 'var(--critical)', icon: '✕', word: 'failing' },
  };
  const gradeWords = {
    'A+': 'Excellent', 'A': 'Excellent', 'B': 'Good',
    'C': 'Needs work', 'D': 'Poor', 'F': 'Failing',
  };
  const scoreColor = (s) =>
    s >= 90 ? 'var(--good)' : s >= 65 ? 'var(--warn)' : s >= 40 ? 'var(--serious)' : 'var(--critical)';

  const $ = (id) => document.getElementById(id);
  const form = $('form'), input = $('url'), btn = $('go');
  const R = 74, CIRC = 2 * Math.PI * R;
  const fill = document.querySelector('.ring .fill');
  const track = document.querySelector('.ring .track');
  fill.style.strokeDasharray = CIRC;
  fill.style.strokeDashoffset = CIRC;

  fetch('https://api.github.com/repos/FrancescoXX/server-pulse')
    .then((r) => (r.ok ? r.json() : Promise.reject()))
    .then((d) => {
      const n = d.stargazers_count;
      if (typeof n !== 'number') return;
      $('starCount').textContent = n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : n;
      $('stars').classList.add('on');
    })
    .catch(() => {}); // no count on API failure — the link still works

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const value = input.value.trim();
    if (!value) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyzing';
    $('error').style.display = 'none';

    try {
      const res = await fetch('/api/analyze?url=' + encodeURIComponent(value));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'analysis failed');
      render(data);
    } catch (err) {
      $('result').style.display = 'none';
      const box = $('error');
      box.textContent = err.message;
      box.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze';
    }
  });

  // dark-mode categorical slots, fixed order per phase
  const PHASE_COLORS = { dns: '#3987e5', tcp: '#199e70', tls: '#c98500', wait: '#9085e9', download: '#e66767' };
  const CAT_NAMES = { framework: 'Framework', cms: 'CMS', language: 'Language', server: 'Server', cdn: 'CDN', platform: 'Platform' };

  function renderExtras(d) {
    let html = '';

    if (d.phases && d.phases.length) {
      const segs = d.phases.filter((p) => p.ms > 0);
      html += '<div class="cat">' +
        '<div class="cat-head"><h2>Request breakdown</h2><span class="pts">' + esc(d.timings.total) + ' ms total</span></div>' +
        '<div class="phasebar">' + segs.map((p) =>
          '<span class="seg" style="background:' + PHASE_COLORS[p.id] + ';flex-grow:' + p.ms + '" title="' + esc(p.label) + ': ' + p.ms + ' ms"></span>'
        ).join('') + '</div>' +
        '<div class="legend">' + d.phases.map((p) =>
          '<span class="li"><span class="dot" style="background:' + PHASE_COLORS[p.id] + '"></span>' + esc(p.label) + ' <b>' + p.ms + ' ms</b></span>'
        ).join('') + '</div></div>';
    }

    if (d.benchmark && d.benchmark.runs.length > 1) {
      const b = d.benchmark;
      const max = Math.max(...b.runs, 1);
      html += '<div class="cat">' +
        '<div class="cat-head"><h2>TTFB stability</h2><span class="pts">min ' + b.min + ' · median ' + b.median + ' · max ' + b.max + ' ms</span></div>' +
        '<div class="bench">' +
          '<div class="median" style="bottom:' + (b.median / max * 100) + '%"><span>median ' + b.median + ' ms</span></div>' +
          b.runs.map((v, i) =>
            '<div class="bcol" title="run ' + (i + 1) + ': ' + v + ' ms"><div class="bfill" style="height:' + Math.max(3, v / max * 100) + '%"></div></div>'
          ).join('') +
        '</div>' +
        '<div class="bruns">' + b.runs.map((v, i) => '<span>' + (i + 1) + '</span>').join('') + '</div>' +
        '</div>';
    }

    html += '<div class="cat"><div class="cat-head"><h2>Detected stack</h2></div>' +
      (d.tech && d.tech.length
        ? '<div class="chips">' + d.tech.map((x) =>
            '<span class="chip"><span class="cat-tag">' + esc(CAT_NAMES[x.category] || x.category) + '</span>' + esc(x.name) + '</span>'
          ).join('') + '</div>'
        : '<div class="nodetect">Nothing recognizable from headers or markup — the server keeps its stack to itself.</div>') +
      '</div>';

    $('extras').innerHTML = html;
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function render(d) {
    $('result').style.display = 'block';

    const color = scoreColor(d.score);
    fill.style.stroke = color;
    track.style.stroke = color;
    fill.style.strokeDashoffset = CIRC;
    requestAnimationFrame(() =>
      requestAnimationFrame(() => {
        fill.style.strokeDashoffset = CIRC * (1 - d.score / 100);
      })
    );

    // count-up
    const el = $('score');
    const t0 = performance.now();
    (function tick(now) {
      const k = Math.min(1, (now - t0) / 900);
      el.textContent = Math.round(d.score * (1 - Math.pow(1 - k, 3)));
      if (k < 1) requestAnimationFrame(tick);
    })(t0);

    const g = $('grade');
    g.textContent = d.grade;
    g.style.color = color;
    $('gradeLabel').textContent = gradeWords[d.grade] || '';

    const redirected = d.finalUrl !== d.requestedUrl;
    $('target').innerHTML =
      '<b>' + esc(d.finalUrl) + '</b>' +
      (redirected ? '<br>redirected from ' + esc(d.requestedUrl) : '');
    $('meta').textContent = [
      d.ip && 'IP ' + d.ip,
      'HTTP ' + d.httpStatus,
      d.issuer && 'cert by ' + d.issuer,
    ].filter(Boolean).join('  ·  ');

    const tileDefs = [
      ['Time to first byte', d.timings.ttfb],
      ['Full response', d.timings.total],
      ['TLS handshake', d.timings.tls],
      ['DNS lookup', d.timings.dns],
    ];
    $('tiles').innerHTML = tileDefs.map(([label, v]) =>
      '<div class="tile"><div class="label">' + esc(label) + '</div>' +
      '<div class="value">' + (v == null ? '–' : esc(v) + '<small>ms</small>') + '</div></div>'
    ).join('');

    renderExtras(d);

    $('cats').innerHTML = d.categories.map((c) => {
      const pct = c.max ? (c.points / c.max) * 100 : 0;
      const mColor = pct >= 85 ? 'var(--good)' : pct >= 55 ? 'var(--warn)' : pct >= 30 ? 'var(--serious)' : 'var(--critical)';
      const rows = d.checks.filter((x) => x.category === c.id).map((x) => {
        const s = STATUS[x.status] || STATUS.warn;
        return '<div class="check"><div class="check-row">' +
          '<span class="icon" style="background:' + s.color + '" title="' + s.word + '">' + s.icon + '</span>' +
          '<span class="name">' + esc(x.label) + '</span>' +
          '<span class="val">' + esc(x.value) + '</span>' +
          (x.hint ? '<div class="hint">' + esc(x.hint) + '</div>' : '') +
          '</div></div>';
      }).join('');
      return '<div class="cat">' +
        '<div class="cat-head"><h2>' + esc(c.label) + '</h2>' +
        '<span class="pts">' + c.points + ' / ' + c.max + '</span></div>' +
        '<div class="meter">' +
          '<div class="m-track" style="background:' + mColor + '"></div>' +
          '<div class="m-fill" style="background:' + mColor + ';width:' + pct + '%"></div>' +
        '</div>' + rows + '</div>';
    }).join('');
  }
})();
</script>
</body>
</html>
